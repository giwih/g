name: Build NP3a Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repo'
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635.git'
      kernel_branch:
        description: 'Kernel branch'
        required: false
        type: string
        default: '6.6/lineage-23.2'
      modules_repo:
        description: 'Kernel modules repo (leave empty to skip)'
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635-modules.git'
      modules_branch:
        description: 'Kernel modules branch'
        required: false
        type: string
        default: '6.6/lineage-23.2'
      devicetrees_repo:
        description: 'Kernel devicetrees repo (leave empty to skip)'
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635-devicetrees.git'
      devicetrees_branch:
        description: 'Kernel devicetrees branch'
        required: false
        type: string
        default: '6.6/lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if in kernel root.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        description: 'Extra config fragments (space-separated)'
        required: false
        type: string
        default: 'vendor/asteroids_perf.config vendor/pineapple_perf.config'
      ksu_next_version:
        description: 'KernelSU-Next version tag (empty = latest main)'
        required: false
        type: string
        default: ''
      kpm_support:
        description: 'Enable KPM support (KALLSYMS + KPROBES)'
        required: false
        type: boolean
        default: false
      susfs_support:
        description: 'Enable SUSFS support'
        required: false
        type: boolean
        default: true
      susfs_branch:
        description: 'SUSFS branch (must match kernel version)'
        required: false
        type: string
        default: 'gki-android15-6.6'
      susfs_force:
        description: 'Force SUSFS patch (ignore failures)'
        required: false
        type: boolean
        default: false
      extra_patches_dir:
        description: 'Extra patch directory (repo-local)'
        required: false
        type: string
        default: ''
      kernel_type:
        description: 'Kernel type identifier (LineageOS, etc.)'
        required: false
        type: string
        default: 'LineageOS'

  workflow_call:
    inputs:
      kernel_repo:
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635.git'
      kernel_branch:
        required: false
        type: string
        default: '6.6/lineage-23.2'
      modules_repo:
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635-modules.git'
      modules_branch:
        required: false
        type: string
        default: '6.6/lineage-23.2'
      devicetrees_repo:
        required: false
        type: string
        default: 'https://github.com/NullDebris/android_kernel_nothing_sm7635-devicetrees.git'
      devicetrees_branch:
        required: false
        type: string
        default: '6.6/lineage-23.2'
      kernel_defconfig:
        description: 'Defconfig(s), space-separated. Use /name if in kernel root.'
        required: false
        type: string
        default: 'gki_defconfig'
      extra_configs:
        required: false
        type: string
        default: 'vendor/asteroids_perf.config vendor/pineapple_perf.config'
      ksu_next_version:
        required: false
        type: string
        default: ''
      kpm_support:
        required: false
        type: boolean
        default: false
      susfs_support:
        required: false
        type: boolean
        default: true
      susfs_branch:
        required: false
        type: string
        default: 'gki-android15-6.6'
      susfs_force:
        required: false
        type: boolean
        default: false
      extra_patches_dir:
        required: false
        type: string
        default: ''
      kernel_type:
        required: false
        type: string
        default: 'LineageOS'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KERNEL_DIR: kernel
      ANYKERNEL_DIR: AnyKernel3
      DEFCONFIG: ${{ inputs.kernel_defconfig }}
      DEFCONFIG_FRAGS: ${{ inputs.extra_configs }}
      MAKE_ARGS: >-
        ARCH=arm64
        CROSS_COMPILE=aarch64-linux-gnu-
        CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
        LLVM=1 LLVM_IAS=1
        LD=ld.lld HOSTLD=ld.lld
        CC=clang CXX=clang++
        HOSTCC=clang HOSTCXX=clang++
        O=out

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential bc bison flex libelf-dev libssl-dev ccache \
            lz4 zip python3 clang llvm lld \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu wget curl git

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b "${{ inputs.kernel_branch || '6.6/lineage-23.2' }}" \
            "${{ inputs.kernel_repo || 'https://github.com/NullDebris/android_kernel_nothing_sm7635.git' }}" \
            "$KERNEL_DIR"

      - name: Clone devicetrees
        if: ${{ inputs.devicetrees_repo != '' }}
        run: |
          git rm -f ${KERNEL_DIR}/arch/arm64/boot/dts/vendor || true
          rm -rf ${KERNEL_DIR}/arch/arm64/boot/dts/vendor
          git clone --depth=1 -b "${{ inputs.devicetrees_branch || '6.6/lineage-23.2' }}" \
            "${{ inputs.devicetrees_repo }}" \
            "${KERNEL_DIR}/arch/arm64/boot/dts/vendor"

      - name: Clone modules
        if: ${{ inputs.modules_repo != '' }}
        run: |
          git rm -f ${KERNEL_DIR}-modules || true
          rm -rf ${KERNEL_DIR}-modules
          git clone --depth=1 -b "${{ inputs.modules_branch || '6.6/lineage-23.2' }}" \
            "${{ inputs.modules_repo }}" \
            "${KERNEL_DIR}-modules"

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git "$ANYKERNEL_DIR"
          rm -rf "$ANYKERNEL_DIR/.git"

      - name: Clone SUSFS
        if: ${{ inputs.susfs_support == true }}
        run: |
          git clone --depth=1 -b "${{ inputs.susfs_branch || 'gki-android15-6.6' }}" \
            https://gitlab.com/simonpunk/susfs4ksu.git

      - name: Setup KernelSU-Next
        run: |
          cd "$KERNEL_DIR"
          VERSION_FLAG=""
          if [ -n "${{ inputs.ksu_next_version }}" ]; then
            VERSION_FLAG="-s ${{ inputs.ksu_next_version }}"
          fi
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" \
            | bash $VERSION_FLAG

      - name: Apply extra patches
        if: ${{ inputs.extra_patches_dir != '' }}
        run: |
          patch_dir="$GITHUB_WORKSPACE/${{ inputs.extra_patches_dir }}"
          if [ ! -d "$patch_dir" ]; then
            echo "Extra patches dir not found: $patch_dir" >&2
            exit 1
          fi
          cd "$KERNEL_DIR"
          while IFS= read -r -d '' patch; do
            echo "Applying $patch"
            patch -p1 < "$patch"
          done < <(find "$patch_dir" -maxdepth 1 -type f \( -name '*.patch' -o -name '*.diff' \) -print0 | sort -z)

      - name: Apply SUSFS patches
        if: ${{ inputs.susfs_support == true }}
        run: |
          cd "$KERNEL_DIR"
          cp ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/
          susfs_patch="../susfs4ksu/kernel_patches/50_add_susfs_in_${{ inputs.susfs_branch || 'gki-android15-6.6' }}.patch"
          if [ "${{ inputs.susfs_force }}" = "true" ]; then
            patch -p1 --force < "$susfs_patch" || echo "Continuing despite patch failure"
          else
            patch -p1 < "$susfs_patch"
          fi

          ksu_next_patch="../susfs4ksu/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu_next.patch"
          if [ -f "$ksu_next_patch" ]; then
            echo "Applying KernelSU-Next SUSFS enablement patch..."
            cd KernelSU-Next
            if [ "${{ inputs.susfs_force }}" = "true" ]; then
              patch -p1 --force < "../../susfs4ksu/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu_next.patch" \
                || echo "Continuing despite patch failure"
            else
              patch -p1 < "../../susfs4ksu/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu_next.patch"
            fi
            cd ..
          else
            echo "No KernelSU-Next specific SUSFS patch found, skipping."
          fi

      - name: Prepare build scripts
        run: |
          chmod +x Scripts/build_kernel.sh
          chmod +x Scripts/package_anykernel.sh

      - name: Enable swap space
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          if sudo fallocate -l 16G /swapfile; then
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile || echo "Swap not permitted on this runner"
          else
            echo "Swap file allocation failed; continuing without swap"
          fi

      - name: Build kernel
        run: |
          SUSFS_SUPPORT="${{ inputs.susfs_support }}" \
          KPM_SUPPORT="${{ inputs.kpm_support }}" \
          Scripts/build_kernel.sh

      - name: Package AnyKernel3
        run: |
          KERNEL_TYPE="${{ inputs.kernel_type || 'LineageOS' }}" Scripts/package_anykernel.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP3a-KSUNext
          path: "kernel-${{ inputs.kernel_type || 'LineageOS' }}-NP3a-KSUNext.zip"
          retention-days: 30

      - name: Upload .config (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: config-NP3a-KSUNext
          path: kernel/out/.config
          retention-days: 3

      - name: Collect .rej files (patch failures)
        if: always()
        id: collect_rej
        run: |
          mkdir -p rej
          found="false"
          while IFS= read -r -d '' f; do
            found="true"
            mkdir -p "rej/$(dirname "$f")"
            cp "$f" "rej/$f"
            orig="${f%.rej}"
            [ -f "$orig" ] && cp "$orig" "rej/$orig"
          done < <(find . -name '*.rej' -print0)
          echo "found=$found" >> "$GITHUB_OUTPUT"

      - name: Upload .rej files
        if: always() && steps.collect_rej.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rej-NP3a-KSUNext
          path: rej/